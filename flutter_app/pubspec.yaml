name: thong_tin_linh_muc
description: Digital Ecclesia - Ứng dụng tra cứu thông tin Linh mục và quản lý định danh giáo sĩ kỹ thuật số.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  animate_do: ^3.3.4
  shared_preferences: ^2.2.2
  mobile_scanner: ^6.0.0
  nfc_manager: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/liturgical/
